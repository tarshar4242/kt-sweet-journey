.branch{margin:10px 0}
.bh{border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s;position:relative;border-left:4px solid var(--bc)}

.bh .t b{font-size:17px;font-weight:800;color:var(--bc)}
.bh .t small{display:block;color:var(--ink2);font-size:12.5px;font-weight:500;margin-top:1px}

.bh .chev{color:var(--ink3);font-size:12px;transition:transform .25s;flex:none}
.branch.open .chev{transform:rotate(90deg)}
.branch.ext .chev,.branch.single .chev{opacity:.35}
.kids{display:none;margin:6px 0 4px 26px;border-left:2px dashed var(--hair);padding-left:14px}
.branch.open .kids{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

document.getElementById('stamp').textContent=DATA.stamp;
document.querySelector('#rootNode').href=DATA.root.url;
document.querySelector('.ru').textContent=DATA.root.url.replace('https://','');
const tree=document.getElementById('tree');
function esc(s){return s;}
DATA.series.forEach((s,i)=>{
  const br=document.createElement('div');
  br.className='branch '+(s.type==='ext'?'ext':s.type==='single'?'single':'');
  br.style.setProperty('--bc',s.color);
  const cnt = s.items? s.items.length+' 項' : (s.type==='ext'?'外站':'單頁');
  br.innerHTML=`<div class="bh glass" style="border-left-color:${s.color}">
      <span class="ic">${s.icon}</span>
      <div class="t"><b>${s.name}</b><small>${s.sub}</small></div>
      <span class="cnt">${cnt}</span>
      <span class="chev">▶</span>
    </div>`;
  const bh=br.querySelector('.bh');
  if(s.type==='ext'||s.type==='single'){
    bh.onclick=()=>window.open(s.url,'_self');
    bh.style.cursor='pointer';
  }else{
    const kids=document.createElement('div');kids.className='kids';
    s.items.forEach(it=>{
      const leaf=document.createElement('div');leaf.className='leaf';leaf.style.setProperty('--bc',s.color);
      const ls=it.links.map(l=>`<a href="${l.url}" target="_self">${l.label}</a>`).join('');
      leaf.innerHTML=`${it.code?`<span class="no">${it.code}</span>`:''}<span class="lt" title="${it.title}">${it.title}</span><span class="ls">${ls}</span>`;
      leaf.dataset.txt=(it.code+' '+it.title).toLowerCase();
      kids.appendChild(leaf);
    });
    br.appendChild(kids);
    bh.onclick=()=>br.classList.toggle('open');
  }
  tree.appendChild(br);
});
function expandAll(on){document.querySelectorAll('.branch').forEach(b=>{if(!b.classList.contains('ext')&&!b.classList.contains('single'))b.classList.toggle('open',on);});}
expandAll(false);
// 搜尋（同時搜「系列名稱」與「各集項目」）
const q=document.getElementById('q');
function hl(el,v){
  const raw = el.dataset.raw!==undefined ? el.dataset.raw : (el.dataset.raw=el.textContent);
  if(!v){ el.innerHTML=raw; return; }
  const idx=raw.toLowerCase().indexOf(v);
  el.innerHTML = idx<0 ? raw : raw.slice(0,idx)+'<mark>'+raw.slice(idx,idx+v.length)+'</mark>'+raw.slice(idx+v.length);
}
q.addEventListener('input',()=>{
  const v=q.value.trim().toLowerCase();
  document.querySelectorAll('.branch').forEach(b=>{
    const nameEl=b.querySelector('.bh .t b');
    const subEl=b.querySelector('.bh .t small');
    const bname=((nameEl?nameEl.textContent:'')+' '+(subEl?subEl.textContent:'')).toLowerCase();
    const nameHit = !!v && bname.includes(v);
    const leaves=[...b.querySelectorAll('.leaf')];
    let leafHit=0;
    leaves.forEach(l=>{
      const own = !v || l.dataset.txt.includes(v);
      const show = own || nameHit;               // 系列名稱命中時，該系列項目全顯示
      l.style.display = show?'':'none';
      const lt=l.querySelector('.lt');
      hl(lt, (v && l.dataset.txt.includes(v)) ? v : '');
      if(v && l.dataset.txt.includes(v)) leafHit++;
    });
    if(nameEl) hl(nameEl, nameHit? v : '');
    const visible = !v || nameHit || leafHit>0;
    b.style.display = visible ? '' : 'none';
    if(leaves.length) b.classList.toggle('open', !!v && (nameHit || leafHit>0));
  });
});
</script>
